<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f1a">
<title>Air Quality Control</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌬</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f1a;
  --surface: #111827;
  --surface-raised: #1a2235;
  --surface-hover: #1f2a40;
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.12);
  --text: #e8ecf4;
  --text-secondary: #7a8599;
  --text-muted: #4a5568;
  --aqi-good: #22c55e;
  --aqi-mod: #eab308;
  --aqi-unhealthy: #f97316;
  --aqi-bad: #ef4444;
  --aqi-vbad: #8b5cf6;
  --aqi-hazard: #7f1d1d;
  --accent: #3b82f6;
  --accent-glow: rgba(59,130,246,0.2);
  --filter-warn: #ef4444;
  --filter-ok: #22c55e;
  --filter-mid: #eab308;
  --radius: 14px;
  --radius-sm: 8px;
  --font-data: 'DM Mono', monospace;
  --font-ui: 'Outfit', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html {
  font-size: 16px;
}
@media (min-width: 1200px) { html { font-size: 20px; } }
@media (min-width: 1800px) { html { font-size: 24px; } }
@media (min-width: 2400px) { html { font-size: 28px; } }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,15,26,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-icon {
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.logo-text {
  font-weight: 600;
  font-size: 0.95rem;
  letter-spacing: -0.02em;
}
.header-meta {
  display: flex;
  align-items: center;
  gap: 8px;
}
.update-time {
  font-family: var(--font-data);
  font-size: 0.65rem;
  color: var(--text-muted);
}
.refresh-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--aqi-good);
  animation: pulse-dot 2s ease-in-out infinite;
}
.refresh-dot.loading {
  background: var(--accent);
  animation: spin-dot 0.8s linear infinite;
}
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes spin-dot { to { transform: rotate(360deg); } }
.quick-actions {
  display: flex;
  gap: 8px;
}
.quick-btn {
  flex: 1;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--text-secondary);
  font-family: var(--font-ui);
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.quick-btn:active { transform: scale(0.96); }
.quick-btn.on-all { border-color: rgba(34,197,94,0.3); color: var(--aqi-good); }
.quick-btn.on-all:active { background: rgba(34,197,94,0.1); }
.quick-btn.off-all { border-color: rgba(239,68,68,0.2); color: var(--filter-warn); }
.quick-btn.off-all:active { background: rgba(239,68,68,0.1); }
.quick-btn .icon { font-size: 0.9rem; }
.summary {
  display: flex;
  gap: 6px;
  padding: 8px 16px 4px;
  overflow-x: auto;
  scrollbar-width: none;
  position: relative;
  z-index: 1;
}
.summary::-webkit-scrollbar { display: none; }
.summary-chip {
  flex-shrink: 0;
  padding: 6px 10px;
  border-radius: 20px;
  font-family: var(--font-data);
  font-size: 0.65rem;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.summary-chip .dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
}
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  padding: 10px 16px 100px;
  position: relative;
  z-index: 1;
  max-width: 600px;
  margin: 0 auto;
}
@media (min-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); max-width: 900px; } }
@media (min-width: 1000px) { .grid { grid-template-columns: repeat(3, 1fr); max-width: 1200px; } }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
  animation: card-in 0.3s ease both;
  display: flex;
  flex-direction: column;
}
.card .mode-row { margin-top: auto; }
.card:nth-child(1) { animation-delay: 0s; }
.card:nth-child(2) { animation-delay: 0.04s; }
.card:nth-child(3) { animation-delay: 0.04s; }
.card:nth-child(4) { animation-delay: 0.08s; }
.card:nth-child(5) { animation-delay: 0.08s; }
.card:nth-child(6) { animation-delay: 0.12s; }
.card:nth-child(7) { animation-delay: 0.12s; }
@keyframes card-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: var(--radius) var(--radius) 0 0;
  transition: background 0.3s;
}
.card.aqi-good-card::before { background: var(--aqi-good); }
.card.aqi-mod-card::before { background: var(--aqi-mod); }
.card.aqi-unhealthy-card::before { background: var(--aqi-unhealthy); }
.card.aqi-bad-card::before { background: var(--aqi-bad); }
.card.aqi-vbad-card::before { background: var(--aqi-vbad); }
.card.aqi-hazard-card::before { background: var(--aqi-hazard); }
.card.offline-card { opacity: 0.4; }
.card.off-card { opacity: 0.65; }
.card-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}
.room-name {
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.2;
  white-space: nowrap;
}
.power-toggle {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}
.power-toggle.on { background: var(--aqi-good); }
.power-toggle.off { background: var(--text-muted); }
.power-toggle::after {
  content: '';
  position: absolute;
  top: 3px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: white;
  transition: left 0.2s;
}
.power-toggle.on::after { left: 23px; }
.power-toggle.off::after { left: 3px; }
.power-toggle:active { transform: scale(0.9); }
.aqi-display { text-align: center; margin: 4px 0 8px; cursor: pointer; }
.aqi-num {
  font-family: var(--font-data);
  font-size: 3.2rem;
  font-weight: 500;
  line-height: 1;
  letter-spacing: -0.03em;
}
.aqi-num.active { animation: breathe 3s ease-in-out infinite; }
@keyframes breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }
.aqi-label {
  font-size: 0.75rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 2px;
}
.aqi-good-color { color: var(--aqi-good); }
.aqi-mod-color { color: var(--aqi-mod); }
.aqi-unhealthy-color { color: var(--aqi-unhealthy); }
.aqi-bad-color { color: var(--aqi-bad); }
.aqi-vbad-color { color: var(--aqi-vbad); }
.aqi-hazard-color { color: var(--aqi-hazard); }
.stats-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.stat-item { text-align: center; flex: 1; }
.stat-val { font-family: var(--font-data); font-size: 0.9rem; font-weight: 500; }
.stat-lbl { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.filter-section { margin-bottom: 8px; }
.filter-bar-track {
  width: 100%; height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}
.filter-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.filter-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
.filter-pct { font-family: var(--font-data); font-size: 0.75rem; font-weight: 500; }
.filter-hrs { font-size: 0.7rem; color: var(--text-muted); }
.filter-reset-btn {
  font-family: var(--font-ui); font-size: 0.65rem; font-weight: 500;
  background: rgba(255,255,255,0.06); color: var(--text-secondary);
  border: 1px solid var(--border-strong); border-radius: 4px;
  padding: 1px 8px; cursor: pointer; margin-left: auto;
  transition: background 0.15s, color 0.15s;
}
.filter-reset-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }
.filter-warning .filter-reset-btn { margin-left: auto; }
.filter-warning {
  background: repeating-linear-gradient(-45deg, rgba(239,68,68,0.08), rgba(239,68,68,0.08) 4px, transparent 4px, transparent 8px);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 6px;
  padding: 4px 8px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 5px;
  animation: warn-flash 2s ease-in-out infinite;
}
@keyframes warn-flash { 0%, 100% { border-color: rgba(239,68,68,0.3); } 50% { border-color: rgba(239,68,68,0.7); } }
.filter-warning .warn-text {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--filter-warn);
  letter-spacing: 0.02em;
}
.mode-row { display: flex; gap: 3px; margin-bottom: 6px; }
.mode-btn {
  flex: 1;
  padding: 10px 4px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-ui);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.mode-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  box-shadow: 0 0 12px var(--accent-glow);
}
.mode-btn:active { transform: scale(0.93); }
.mode-btn:disabled { opacity: 0.3; pointer-events: none; }
.card-expand-area {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.25s ease;
}
.card.expanded .card-expand-area { max-height: 120px; }
.fan-row { display: flex; align-items: center; gap: 6px; }
.fan-label { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.fan-slider {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  border-radius: 2px;
  background: rgba(255,255,255,0.08);
  outline: none;
}
.fan-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 8px var(--accent-glow);
}
.fan-val { font-family: var(--font-data); font-size: 0.65rem; color: var(--text-secondary); min-width: 16px; text-align: right; }
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  gap: 16px;
  position: relative;
  z-index: 1;
}
.loading-rings { width: 48px; height: 48px; position: relative; }
.loading-rings::before, .loading-rings::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid transparent;
}
.loading-rings::before { border-top-color: var(--accent); animation: spin 1s linear infinite; }
.loading-rings::after { border-bottom-color: rgba(59,130,246,0.3); animation: spin 1.5s linear infinite reverse; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 0.8rem; color: var(--text-secondary); letter-spacing: 0.03em; }
.error-bar {
  background: rgba(239,68,68,0.1);
  border-bottom: 1px solid rgba(239,68,68,0.2);
  padding: 8px 16px;
  font-size: 0.7rem;
  color: var(--filter-warn);
  text-align: center;
  display: none;
  position: relative;
  z-index: 1;
}
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 10px 20px;
  border-radius: 10px;
  font-family: var(--font-ui);
  font-size: 0.75rem;
  font-weight: 500;
  z-index: 999;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
.toast.success {
  background: rgba(34,197,94,0.9);
  color: white;
}
.toast.error {
  background: rgba(239,68,68,0.9);
  color: white;
}
.outdoor-bar {
  margin: 0 16px 4px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  position: relative;
  z-index: 1;
}
.outdoor-bar .outdoor-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.outdoor-aqi-num {
  font-family: var(--font-data);
  font-size: 1.5rem;
  font-weight: 600;
  line-height: 1;
}
.outdoor-meta {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.outdoor-label {
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.outdoor-station {
  font-size: 0.6rem;
  color: var(--text-muted);
}
.outdoor-comparison {
  font-family: var(--font-data);
  font-size: 0.65rem;
  color: var(--text-secondary);
  text-align: right;
  white-space: nowrap;
}
.card.spike-card {
  border-color: var(--aqi-unhealthy);
  animation: spike-pulse 1.5s ease-in-out infinite;
}
@keyframes spike-pulse {
  0%, 100% { border-color: var(--aqi-unhealthy); box-shadow: none; }
  50% { border-color: var(--aqi-bad); box-shadow: 0 0 12px rgba(249,115,22,0.3); }
}
.spike-badge {
  display: inline-block;
  font-size: 0.55rem;
  font-weight: 600;
  color: var(--aqi-unhealthy);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-left: 4px;
  vertical-align: super;
}
.gear-btn {
  background: none; border: none; color: var(--text-muted); font-size: 0.85rem;
  cursor: pointer; padding: 2px 4px; transition: color 0.15s;
}
.gear-btn:hover { color: var(--text); }
.lock-indicator {
  font-size: 0.6rem; color: var(--aqi-mod); margin-left: 4px;
}
.schedule-label {
  font-family: var(--font-data); font-size: 0.6rem; color: var(--text-muted);
  margin-bottom: 4px; text-align: center;
}
.settings-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 200; display: none;
}
.settings-backdrop.open { display: block; }
.settings-modal {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: var(--surface-raised); border: 1px solid var(--border-strong);
  border-radius: var(--radius); padding: 20px; z-index: 201;
  width: min(360px, 90vw); display: none;
}
.settings-modal.open { display: block; }
.settings-title {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; font-weight: 600; font-size: 0.95rem;
}
.settings-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 1.2rem; cursor: pointer; padding: 0 4px;
}
.settings-close:hover { color: var(--text); }
.settings-section {
  border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px;
}
.settings-section:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
.settings-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0;
}
.settings-label {
  font-size: 0.8rem; color: var(--text-secondary);
}
.settings-toggle {
  width: 36px; height: 20px; border-radius: 10px; border: none;
  cursor: pointer; position: relative; transition: background 0.2s;
}
.settings-toggle.on { background: var(--aqi-good); }
.settings-toggle.off { background: var(--text-muted); }
.settings-toggle::after {
  content: ''; position: absolute; top: 2px; width: 16px; height: 16px;
  border-radius: 50%; background: white; transition: left 0.2s;
}
.settings-toggle.on::after { left: 18px; }
.settings-toggle.off::after { left: 2px; }
.brightness-group { display: flex; gap: 3px; }
.brightness-btn {
  padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text-muted); font-family: var(--font-ui);
  font-size: 0.7rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.brightness-btn.active {
  background: var(--accent); border-color: var(--accent); color: white;
}
.schedule-inputs {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.schedule-inputs label { font-size: 0.7rem; color: var(--text-muted); }
.schedule-inputs input[type="time"] {
  background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: 6px; color: var(--text); font-family: var(--font-data);
  font-size: 0.75rem; padding: 4px 6px;
}
.schedule-inputs button {
  padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); font-family: var(--font-ui);
  font-size: 0.7rem; cursor: pointer; transition: all 0.15s;
}
.schedule-inputs button:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.schedule-inputs .save-btn { border-color: rgba(34,197,94,0.3); color: var(--aqi-good); }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">&#x1F32C;</div>
      <span class="logo-text">Air Quality</span>
    </div>
    <div class="header-meta">
      <span class="update-time" id="updateTime">--:--</span>
      <div class="refresh-dot" id="refreshDot"></div>
    </div>
  </div>
  <div class="quick-actions">
    <button class="quick-btn on-all" onclick="allOn()"><span class="icon">&#9654;</span> All On</button>
    <button class="quick-btn off-all" onclick="allOff()"><span class="icon">&#9724;</span> All Off</button>
    <button class="quick-btn" onclick="fetchStatus()"><span class="icon">&#x21BB;</span> Refresh</button>
  </div>
</div>
<div class="error-bar" id="errorBar"></div>
<div id="summaryBar" class="summary"></div>
<div class="outdoor-bar" id="outdoorBar" style="display:none;"></div>
<div class="loading-screen" id="loadingScreen">
  <div class="loading-rings"></div>
  <div class="loading-text">Connecting to purifiers...</div>
</div>
<div class="grid" id="grid" style="display:none;"></div>
<div class="toast" id="toast"></div>
<div class="settings-backdrop" id="settingsBackdrop" onclick="closeSettings()"></div>
<div class="settings-modal" id="settingsModal"></div>
<script>
const API = window.location.pathname.replace(/\/+$/, '');
let devices = [];
let outdoor = null;
let schedules = {};
let fanConfig = {};
let levelPresets = {};
let busyDevices = new Set();
let refreshTimer = null;

function aqiColor(aqi) {
  if (aqi == null) return 'var(--text-muted)';
  if (aqi <= 50) return 'var(--aqi-good)';
  if (aqi <= 100) return 'var(--aqi-mod)';
  if (aqi <= 150) return 'var(--aqi-unhealthy)';
  if (aqi <= 200) return 'var(--aqi-bad)';
  if (aqi <= 300) return 'var(--aqi-vbad)';
  return 'var(--aqi-hazard)';
}
function aqiCls(aqi) {
  if (aqi == null) return '';
  if (aqi <= 50) return 'aqi-good';
  if (aqi <= 100) return 'aqi-mod';
  if (aqi <= 150) return 'aqi-unhealthy';
  if (aqi <= 200) return 'aqi-bad';
  if (aqi <= 300) return 'aqi-vbad';
  return 'aqi-hazard';
}
function aqiLabel(aqi) {
  if (aqi == null) return 'N/A';
  if (aqi <= 50) return 'Good';
  if (aqi <= 100) return 'Moderate';
  if (aqi <= 150) return 'Sensitive';
  if (aqi <= 200) return 'Unhealthy';
  if (aqi <= 300) return 'Very Unhealthy';
  return 'Hazardous';
}
function filterColor(pct) {
  if (pct == null) return 'var(--text-muted)';
  if (pct > 50) return 'var(--filter-ok)';
  if (pct > 15) return 'var(--filter-mid)';
  return 'var(--filter-warn)';
}
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

var FILTER_RESET_GUIDE = {
  'zhimi.airpurifier.mb4': '3C: Hold RIGHT button 7 sec in standby (3 beeps + green light)',
  'xiaomi.airp.cpa4':      '4 Compact: Hold POWER button 6 sec in standby (sound + green light)',
  'xiaomi.airp.va2b':      '4 Pro: Insert paperclip in reset pin-hole (near power cord) 5 sec',
  'zhimi.airp.mb5':        '4: Hold POWER + DISPLAY buttons together 7 sec (2 beeps + green blink)',
  'zhimi.airp.rmb1':       '4 Lite: Hold RESET button on back panel 6 sec (short sound)',
};

function filterTimeEstimate(life, hours) {
  if (life == null || life <= 0) return 'Replace now';
  if (hours == null || hours <= 0 || life >= 100) return 'New filter';
  var remainHours = hours * life / (100 - life);
  var days = Math.round(remainHours / 24);
  if (days >= 60) return '~' + Math.round(days / 30) + 'mo left';
  if (days >= 1) return '~' + days + 'd left';
  return '<1d left';
}

function renderSummary() {
  const bar = document.getElementById('summaryBar');
  const online = devices.filter(d => d.online).length;
  const running = devices.filter(d => d.online && d.power).length;
  const aqis = devices.filter(d => d.aqi != null);
  const avgAqi = aqis.length ? Math.round(aqis.reduce((s, d) => s + d.aqi, 0) / aqis.length) : 0;
  const lowFilter = devices.filter(d => d.filter_life != null && d.filter_life <= 15);
  bar.textContent = '';

  // Worst room chip: show highest PM2.5 room if any is >50, else show avg
  var aqiChip;
  var worst = aqis.length ? aqis.reduce((w, d) => d.aqi > w.aqi ? d : w) : null;
  if (worst && worst.aqi > 50) {
    aqiChip = {text: worst.name + ': ' + worst.aqi, color: aqiColor(worst.aqi)};
  } else {
    aqiChip = {text: 'Avg PM2.5: ' + avgAqi, color: aqiColor(avgAqi)};
  }

  const chips = [
    {text: running + '/' + online + ' running', color: 'var(--aqi-good)'},
    aqiChip,
  ];
  if (lowFilter.length > 0) {
    chips.push({text: lowFilter.length + ' filter' + (lowFilter.length > 1 ? 's' : '') + ' low', color: 'var(--filter-warn)', warn: true});
  }
  chips.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'summary-chip';
    if (c.warn) chip.style.cssText = 'border-color:rgba(239,68,68,0.3);color:var(--filter-warn)';
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.style.background = c.color;
    chip.appendChild(dot);
    chip.appendChild(document.createTextNode(c.text));
    bar.appendChild(chip);
  });
}

  // Mode buttons — renamed to match Xiaomi app

    {label: 'Auto', value: 'auto'},
    {label: 'Sleep', value: 'silent'},

  var isManual = (curMode === 'favorite' || curMode === 'fan');
  modeMap.forEach(function(m) {
    const btn = document.createElement('button');

    btn.className = 'mode-btn' + (active ? ' active' : '');

  return card;

async function fetchStatus() {
  const dot = document.getElementById('refreshDot');
  dot.classList.add('loading');
  try {
    const res = await fetch(API + '/api/status');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    devices = data.devices || [];
    outdoor = data.outdoor || null;
    schedules = data.schedules || {};
    fanConfig = data.fan_config || {};
    levelPresets = data.level_presets || {};
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('grid').style.display = '';
    document.getElementById('errorBar').style.display = 'none';
    renderSummary();
    renderOutdoor();
    renderDevices();
    document.getElementById('updateTime').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  } catch (e) {
    document.getElementById('errorBar').textContent = 'Connection lost: ' + e.message;
    document.getElementById('errorBar').style.display = '';
    if (devices.length > 0) {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('grid').style.display = '';
    }
  }
  dot.classList.remove('loading');
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(fetchStatus, 15000);
}

let pendingRefresh = null;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  var dur = type === 'error' ? 4000 : 2000;
  setTimeout(() => { t.className = 'toast'; }, dur);
}
async function post(url, body, successMsg) {
  var match = url.match(/\/device\/([^/]+)/);
  var devId = match ? match[1] : null;
  if (devId) busyDevices.add(devId);
  // Pause auto-refresh so it doesn't overwrite optimistic state with stale data
  clearTimeout(refreshTimer);
  try {
    const res = await fetch(API + url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body || {}) });
    const data = await res.json();
    if (!res.ok) {
      showToast('Error: ' + (data.error || 'Unknown'), 'error');
    } else if (Array.isArray(data)) {
      var ok = data.filter(function(r) { return r.ok; }).length;
      var total = data.length;
      if (ok === total) {
        showToast(successMsg || (ok + '/' + total + ' done'), 'success');
      } else {
        showToast(ok + '/' + total + ' succeeded (' + (total - ok) + ' offline)', 'error');
      }
    } else {
      showToast(successMsg || 'Done', 'success');
    }
    if (devId) busyDevices.delete(devId);
    clearTimeout(pendingRefresh);
    pendingRefresh = setTimeout(function() {
      fetchStatus().then(function() {
        if (settingsDeviceId) openSettings(settingsDeviceId);
      });
    }, 2000);  // Wait 2s so background poller has fresh data
  } catch (e) {
    showToast('Connection failed', 'error');
    if (devId) busyDevices.delete(devId);
    // Restart auto-refresh on failure
    clearTimeout(refreshTimer);
    refreshTimer = setTimeout(fetchStatus, 5000);
  }
}

function togglePower(id, isOn) {
  busyDevices.add(id);
  var d = devices.find(function(x) { return x.id === id; });
  if (d) { d.power = !isOn; }
  renderDevices();
  post('/api/device/' + id + '/power', {power: !isOn}, isOn ? 'Turned off' : 'Turned on');
}
var MODE_DISPLAY = {auto:'Auto', silent:'Silent', favorite:'Favorite', fan:'Fan'};
function setMode(id, mode) {
  busyDevices.add(id);
  var d = devices.find(function(x) { return x.id === id; });
  if (d) { d.mode = MODE_DISPLAY[mode] || mode; }
  renderDevices();
  var names = {auto:'Auto', silent:'Sleep', favorite:'Manual', fan:'Fan'};
  post('/api/device/' + id + '/mode', {mode: mode}, 'Mode: ' + (names[mode] || mode));
}
function setFan(id, preset) {
  busyDevices.add(id);
  var d = devices.find(function(x) { return x.id === id; });
  var presets = levelPresets[d ? d.model : ''] || {};
  if (d && presets[preset] != null) { d.mode = 'Favorite'; d.fan_speed = presets[preset]; }
  renderDevices();
  var labels = {low: 'Low', mid: 'Mid', high: 'High'};
  post('/api/device/' + id + '/fan_level', {level: preset}, 'Speed: ' + (labels[preset] || preset));
}
function resetFilter(id) {
  if (!confirm('Reset filter counter?\nOnly do this after replacing the filter.')) return;
  post('/api/device/' + id + '/filter_reset', {}, 'Filter reset');
}
function allOn() {
  if (!confirm('Turn on all purifiers?')) return;
  post('/api/all_on', {}, 'All purifiers on');
}
function allOff() {
  if (!confirm('Turn off all purifiers?')) return;
  post('/api/all_off', {}, 'All purifiers off');
}

  row.appendChild(offInput);
  row.appendChild(removeBtn);
  // Insert before the action row (last child)
  var children = container.children;
  container.insertBefore(row, children[children.length - 1] || null);
  // Ensure action row has Save/Clear buttons (styled)
  var actionRow = children[children.length - 1];
  if (actionRow && !actionRow.querySelector('.save-btn')) {
    var saveBtn = document.createElement('button');
    saveBtn.className = 'save-btn brightness-btn';
    saveBtn.style.borderColor = 'rgba(34,197,94,0.3)';
    saveBtn.style.color = 'var(--aqi-good)';
    saveBtn.textContent = 'Save';
    saveBtn.onclick = function() { saveSchedules(id); };
    var clearBtn = document.createElement('button');
    clearBtn.className = 'brightness-btn';
    clearBtn.textContent = 'Clear All';
    clearBtn.onclick = function() { clearSchedule(id); };
    actionRow.appendChild(saveBtn);
    actionRow.appendChild(clearBtn);
  }
}

function saveSchedules(id) {
  var rows = document.querySelectorAll('.sched-row');
  var pairs = [];
  rows.forEach(function(row) {
    var on = row.querySelector('.sched-on').value;
    var off = row.querySelector('.sched-off').value;
    if (on && off) pairs.push({on: on, off: off});
  });
  if (pairs.length === 0) { showToast('Add at least one schedule', 'error'); return; }
  var timeRe = /^([01]\d|2[0-3]):[0-5]\d$/;
  for (var i = 0; i < pairs.length; i++) {
    if (!timeRe.test(pairs[i].on) || !timeRe.test(pairs[i].off)) {
      showToast('Invalid time format \u2014 use HH:MM', 'error');
      return;
    }
  }
  var label = pairs.map(function(p) { return p.on + '\u2013' + p.off; }).join(', ');
  post('/api/device/' + id + '/schedule', {schedules: pairs}, 'Schedule: ' + label);
  closeSettings();
}

function clearSchedule(id) {
  post('/api/device/' + id + '/schedule', {clear: true}, 'Schedule cleared');
  closeSettings();
}

fetchStatus();
</script>
</body>
</html>
