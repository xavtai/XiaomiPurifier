<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Air Purifier Control</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg-card: #16213e;
  --bg-card-off: #0f1629;
  --text: #e0e0e0;
  --text-dim: #8892a4;
  --accent: #4fc3f7;
  --accent-hover: #29b6f6;
  --green: #66bb6a;
  --yellow: #fdd835;
  --orange: #ffa726;
  --red: #ef5350;
  --border: #2a3a5c;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --radius: 12px;
}
.light {
  --bg: #f0f2f5;
  --bg-card: #ffffff;
  --bg-card-off: #e8eaed;
  --text: #1a1a2e;
  --text-dim: #666;
  --border: #ddd;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 1.2rem; font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 12px; }
.refresh-info { font-size: 0.75rem; color: var(--text-dim); }
.theme-btn {
  background: none; border: none; color: var(--text); font-size: 1.3rem;
  cursor: pointer; padding: 4px;
}
.refresh-btn {
  background: var(--accent); color: #fff; border: none; border-radius: 8px;
  padding: 6px 14px; font-size: 0.8rem; cursor: pointer; font-weight: 500;
}
.refresh-btn:hover { background: var(--accent-hover); }

/* Grid */
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  padding: 16px 20px 100px;
  max-width: 1200px;
  margin: 0 auto;
}
@media (min-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 960px) { .grid { grid-template-columns: repeat(3, 1fr); } }

/* Card */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  transition: background 0.3s, opacity 0.3s;
}
.card.offline { opacity: 0.5; }
.card.powered-off { background: var(--bg-card-off); }

.card-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.device-name { font-weight: 600; font-size: 1rem; }
.status-badge {
  font-size: 0.7rem; padding: 3px 8px; border-radius: 20px; font-weight: 500;
}
.status-badge.online { background: var(--green); color: #fff; }
.status-badge.offline { background: var(--red); color: #fff; }
.status-badge.off { background: var(--text-dim); color: #fff; }
.protocol-badge {
  font-size: 0.6rem; color: var(--text-dim); margin-left: 6px;
}

/* AQI display */
.aqi-section { text-align: center; margin-bottom: 16px; }
.aqi-value {
  font-size: 3.5rem; font-weight: 700; line-height: 1;
  transition: color 0.3s;
}
.aqi-label { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }
.aqi-good { color: var(--green); }
.aqi-moderate { color: var(--yellow); }
.aqi-unhealthy { color: var(--orange); }
.aqi-bad { color: var(--red); }

/* Stats row */
.stats {
  display: flex; justify-content: space-around; margin-bottom: 16px;
  padding: 10px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.stat { text-align: center; }
.stat-value { font-size: 1.1rem; font-weight: 600; }
.stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

/* Filter bar */
.filter-bar {
  margin-bottom: 16px;
}
.filter-label { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 4px; }
.filter-track {
  width: 100%; height: 6px; background: var(--border); border-radius: 3px;
  overflow: hidden;
}
.filter-fill {
  height: 100%; border-radius: 3px; transition: width 0.5s, background 0.3s;
}

/* Controls */
.controls { display: flex; flex-direction: column; gap: 10px; }
.control-row {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.control-label { font-size: 0.8rem; color: var(--text-dim); min-width: 50px; }

/* Power button */
.power-btn {
  width: 100%; padding: 12px; border-radius: 10px; border: none;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.power-btn:active { transform: scale(0.97); }
.power-btn.on { background: var(--red); color: #fff; }
.power-btn.off { background: var(--green); color: #fff; }
.power-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Mode selector */
.mode-btns { display: flex; gap: 4px; flex: 1; }
.mode-btn {
  flex: 1; padding: 8px 4px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); font-size: 0.7rem; cursor: pointer;
  transition: all 0.2s;
}
.mode-btn.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.mode-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Fan slider */
.fan-slider {
  flex: 1; -webkit-appearance: none; height: 6px; border-radius: 3px;
  background: var(--border); outline: none;
}
.fan-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
}
.fan-level-val { font-size: 0.9rem; font-weight: 600; min-width: 24px; text-align: center; }

/* Toggle buttons */
.toggle-row { display: flex; gap: 8px; }
.toggle-btn {
  flex: 1; padding: 8px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); font-size: 0.75rem; cursor: pointer;
  transition: all 0.2s;
}
.toggle-btn.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}

/* Loading */
.loading {
  text-align: center; padding: 60px 20px; color: var(--text-dim);
}
.loading .spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Error banner */
.error-banner {
  background: var(--red); color: #fff; padding: 10px 20px;
  text-align: center; font-size: 0.85rem; display: none;
}

/* Motor speed */
.motor-info {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px;
}
</style>
</head>
<body>

<div class="header">
  <h1>Air Purifier Control</h1>
  <div class="header-right">
    <span class="refresh-info" id="refreshInfo">Loading...</span>
    <button class="refresh-btn" onclick="fetchStatus()">Refresh</button>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">&#9790;</button>
  </div>
</div>

<div class="error-banner" id="errorBanner"></div>

<div class="loading" id="loadingState">
  <div class="spinner"></div>
  <div>Connecting to purifiers...</div>
</div>

<div class="grid" id="grid" style="display:none;"></div>

<script>
const API_BASE = '';
let devices = [];
let refreshTimer = null;
const REFRESH_INTERVAL = 15000;

// Theme
function toggleTheme() {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  localStorage.setItem('purifier-theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isLight ? '\u2600' : '\u263E';
}
(function initTheme() {
  if (localStorage.getItem('purifier-theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeBtn').textContent = '\u2600';
  }
})();

// AQI helpers
function aqiClass(aqi) {
  if (aqi == null) return '';
  if (aqi <= 50) return 'aqi-good';
  if (aqi <= 100) return 'aqi-moderate';
  if (aqi <= 150) return 'aqi-unhealthy';
  return 'aqi-bad';
}
function aqiText(aqi) {
  if (aqi == null) return 'N/A';
  if (aqi <= 50) return 'Good';
  if (aqi <= 100) return 'Moderate';
  if (aqi <= 150) return 'Unhealthy';
  return 'Hazardous';
}
function filterColor(pct) {
  if (pct > 50) return 'var(--green)';
  if (pct > 20) return 'var(--yellow)';
  return 'var(--red)';
}

function renderDevices() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (devices.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim);">No devices configured. Edit <code>devices.json</code> to add your purifiers.</div>';
    return;
  }

  devices.forEach(d => {
    const isOn = d.online && d.power;
    const cardClass = !d.online ? 'card offline' : (!d.power ? 'card powered-off' : 'card');
    const modes = ['auto', 'silent', 'favorite', 'fan'];
    const currentMode = (d.mode || '').toLowerCase().replace('operationmode.', '');

    const card = document.createElement('div');
    card.className = cardClass;
    card.innerHTML = `
      <div class="card-header">
        <div>
          <span class="device-name">${esc(d.name)}</span>
          <span class="protocol-badge">${d.protocol || ''}</span>
        </div>
        <span class="status-badge ${d.online ? (d.power ? 'online' : 'off') : 'offline'}">
          ${d.online ? (d.power ? 'ON' : 'OFF') : 'OFFLINE'}
        </span>
      </div>

      <div class="aqi-section">
        <div class="aqi-value ${aqiClass(d.aqi)}">${d.aqi != null ? d.aqi : '--'}</div>
        <div class="aqi-label">PM2.5 &middot; ${aqiText(d.aqi)}</div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-value">${d.temperature != null ? d.temperature + '&deg;' : '--'}</div>
          <div class="stat-label">Temp</div>
        </div>
        <div class="stat">
          <div class="stat-value">${d.humidity != null ? d.humidity + '%' : '--'}</div>
          <div class="stat-label">Humidity</div>
        </div>
        <div class="stat">
          <div class="stat-value">${d.motor_speed != null ? d.motor_speed : '--'}</div>
          <div class="stat-label">RPM</div>
        </div>
      </div>

      ${d.filter_life != null ? `
      <div class="filter-bar">
        <div class="filter-label">Filter life: ${d.filter_life}%${d.filter_hours_used != null ? ' (' + d.filter_hours_used + 'h used)' : ''}</div>
        <div class="filter-track">
          <div class="filter-fill" style="width:${d.filter_life}%;background:${filterColor(d.filter_life)}"></div>
        </div>
      </div>` : ''}

      <div class="controls">
        <button class="power-btn ${isOn ? 'on' : 'off'}" onclick="togglePower('${d.id}', ${isOn})"
                ${!d.online ? 'disabled' : ''}>
          ${isOn ? 'Turn Off' : 'Turn On'}
        </button>

        <div class="control-row">
          <span class="control-label">Mode</span>
          <div class="mode-btns">
            ${modes.map(m => `
              <button class="mode-btn ${currentMode === m ? 'active' : ''}"
                      onclick="setMode('${d.id}','${m}')"
                      ${!isOn ? 'disabled' : ''}>${m.charAt(0).toUpperCase() + m.slice(1)}</button>
            `).join('')}
          </div>
        </div>

        <div class="control-row">
          <span class="control-label">Fan</span>
          <input type="range" class="fan-slider" min="0" max="14"
                 value="${d.fan_level || 0}"
                 oninput="this.nextElementSibling.textContent=this.value"
                 onchange="setFanLevel('${d.id}', this.value)"
                 ${!isOn ? 'disabled' : ''}>
          <span class="fan-level-val">${d.fan_level || 0}</span>
        </div>

        <div class="toggle-row">
          <button class="toggle-btn ${d.buzzer ? 'active' : ''}"
                  onclick="toggleBuzzer('${d.id}', ${!d.buzzer})"
                  ${!d.online ? 'disabled' : ''}>
            Buzzer ${d.buzzer ? 'On' : 'Off'}
          </button>
          <button class="toggle-btn ${d.led ? 'active' : ''}"
                  onclick="toggleLed('${d.id}', ${!d.led})"
                  ${!d.online ? 'disabled' : ''}>
            LED ${d.led ? 'On' : 'Off'}
          </button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

async function fetchStatus() {
  try {
    const res = await fetch(API_BASE + '/api/status');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    devices = await res.json();
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('grid').style.display = '';
    document.getElementById('errorBanner').style.display = 'none';
    renderDevices();
    document.getElementById('refreshInfo').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('errorBanner').textContent = 'Connection error: ' + e.message;
    document.getElementById('errorBanner').style.display = '';
    // Still show grid if we had previous data
    if (devices.length > 0) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('grid').style.display = '';
    }
  }
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(fetchStatus, REFRESH_INTERVAL);
}

async function apiPost(url, body) {
  try {
    const res = await fetch(API_BASE + url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) {
      console.error('API error:', data.error);
    }
    // Refresh after command
    setTimeout(fetchStatus, 1000);
  } catch (e) {
    console.error('API call failed:', e);
  }
}

function togglePower(id, isOn) { apiPost(`/api/device/${id}/power`, {action: isOn ? 'off' : 'on'}); }
function setMode(id, mode) { apiPost(`/api/device/${id}/mode`, {mode}); }
function setFanLevel(id, level) { apiPost(`/api/device/${id}/fan_level`, {level: parseInt(level)}); }
function toggleBuzzer(id, enabled) { apiPost(`/api/device/${id}/buzzer`, {enabled}); }
function toggleLed(id, enabled) { apiPost(`/api/device/${id}/led`, {enabled}); }

// Start
fetchStatus();
</script>
</body>
</html>
